<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 900px; padding: 16px; }
  h2 { text-align: center; margin-bottom: 12px; font-size: 1.1rem; color: #ccc; }
  video { width: 100%; border-radius: 10px; background: #000; max-height: 80vh; }
  .badge { text-align: center; margin-top: 10px; font-size: 0.8rem; color: #666; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .loading { animation: pulse 1.2s ease-in-out infinite; }
  .error { text-align: center; color: #f44; font-size: 1rem; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <h2 id="title">🎬 Drama Player</h2>
  <video id="video" controls autoplay playsinline></video>
  <div class="badge" id="badge">Loading...</div>
  <div class="error" id="error"></div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const src = params.get('url');
  const title = params.get('title');
  const ep = params.get('ep');
  const platform = params.get('platform') || '';

  if (title) {
    const decoded = decodeURIComponent(title);
    const seLabel = params.get('season') && params.get('episode')
      ? `S${params.get('season')}E${params.get('episode')} · ` : (ep ? 'Episode ' + ep + ' - ' : '');
    document.getElementById('title').textContent = seLabel + decoded;
    document.title = decoded;
  }

  const badge = document.getElementById('badge');
  const video = document.getElementById('video');
  const errEl = document.getElementById('error');

  function setError(msg) { errEl.textContent = msg; badge.textContent = ''; }

  let mbResolveParams = null;

  function playMp4(cdnUrl, qualityLabel, stale) {
    badge.className = 'badge';
    badge.textContent = 'MovieBox · ' + qualityLabel + 'p · Streaming' + (stale ? ' ⚠️' : '');
    video.setAttribute('referrerpolicy', 'no-referrer');
    video.src = cdnUrl;
    let retried = false;
    video.addEventListener('error', () => {
      if (!retried && mbResolveParams) {
        retried = true;
        badge.textContent = 'MovieBox · Mencoba ulang...';
        errEl.textContent = '';
        fetch('/resolve/mb?' + mbResolveParams.toString() + '&_r=' + Date.now())
          .then(r => r.json())
          .then(data2 => {
            if (data2.error) return setError('Gagal: ' + data2.error + ' · Klik quality di Discord lagi.');
            if (data2.url !== cdnUrl) {
              video.src = data2.url;
              badge.textContent = 'MovieBox · ' + data2.quality + 'p · Streaming (retried)';
            } else {
              setError('Link kedaluwarsa. Kembali ke Discord dan pilih kualitas lagi.');
            }
          })
          .catch(() => setError('Link kedaluwarsa. Kembali ke Discord dan pilih kualitas lagi.'));
      } else {
        setError('Gagal memuat video. Kembali ke Discord dan pilih kualitas lagi.');
      }
    });
  }

  // ── MovieBox: resolve fresh CDN URL at load time ──────────────────────────
  if (platform === 'moviebox') {
    const subjectId = params.get('subjectId');
    if (!subjectId) return setError('Parameter tidak lengkap.');
    badge.className = 'badge loading';
    badge.textContent = 'MovieBox · Memuat link... (maks ~5 detik)';
    mbResolveParams = new URLSearchParams({ subjectId, quality: params.get('quality') || '360' });
    if (params.get('season')) mbResolveParams.set('season', params.get('season'));
    if (params.get('episode')) mbResolveParams.set('episode', params.get('episode'));
    fetch('/resolve/mb?' + mbResolveParams.toString())
      .then(r => r.json())
      .then(data => {
        if (data.error) return setError('Gagal mendapat link: ' + data.error);
        playMp4(data.url, data.quality, data.stale);
      })
      .catch(e => setError('Gagal resolve URL: ' + e.message));

  // ── HLS / other platforms ─────────────────────────────────────────────────
  } else if (!src) {
    setError('URL video tidak ditemukan.');
  } else {
    const resolvedSrc = decodeURIComponent(src);
    const isHLS = resolvedSrc.includes('.m3u8') || resolvedSrc.includes('/proxy/m3u8') || resolvedSrc.includes('/proxy/direct');

    if (isHLS) {
      const platLabel = { melolo: 'Melolo', reelshort: 'ReelShort', freereels: 'FreeReels' }[platform] || platform;
      badge.textContent = platLabel + ' · Streaming HLS';
      if (Hls.isSupported()) {
        const hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
        hls.loadSource(resolvedSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { badge.textContent = badge.textContent; });
        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) setError('Gagal memuat video HLS: ' + data.type + ' - ' + (data.details || ''));
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = resolvedSrc;
        badge.textContent = 'Native HLS';
      } else {
        setError('Browser tidak mendukung HLS. Gunakan Chrome atau Safari.');
      }
    } else {
      // Direct MP4 (Melolo)
      const platLabelMp4 = { melolo: 'Melolo' }[platform] || 'Video';
      const quality = params.get('quality');
      badge.textContent = platLabelMp4 + (quality ? ` · ${quality}p` : '') + ' · Streaming';
      video.src = resolvedSrc;
      video.addEventListener('error', () => {
        setError('Gagal memuat video MP4. Coba refresh halaman.');
      });
    }
  }
</script>
</body>
</html>
