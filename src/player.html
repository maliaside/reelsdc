<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 900px; padding: 16px; }
  h2 { text-align: center; margin-bottom: 12px; font-size: 1.1rem; color: #ccc; }
  video { width: 100%; border-radius: 10px; background: #000; max-height: 80vh; }
  .badge { text-align: center; margin-top: 10px; font-size: 0.8rem; color: #666; }
  .error { text-align: center; color: #f44; font-size: 1rem; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <h2 id="title">🎬 Drama Player</h2>
  <video id="video" controls autoplay playsinline></video>
  <div class="badge" id="badge">Loading...</div>
  <div class="error" id="error"></div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const src = params.get('url');
  const title = params.get('title');
  const ep = params.get('ep');
  const platform = params.get('platform') || '';

  if (title) {
    const decoded = decodeURIComponent(title);
    document.getElementById('title').textContent = (ep ? 'Episode ' + ep + ' - ' : '') + decoded;
    document.title = decoded;
  }

  const badge = document.getElementById('badge');
  const video = document.getElementById('video');
  const errEl = document.getElementById('error');

  function setError(msg) { errEl.textContent = msg; badge.textContent = ''; }

  if (!src) {
    setError('URL video tidak ditemukan.');
  } else {
    const resolvedSrc = decodeURIComponent(src);
    const isHLS = resolvedSrc.includes('.m3u8') || resolvedSrc.includes('/proxy/m3u8') || resolvedSrc.includes('/proxy/direct');

    if (isHLS) {
      badge.textContent = (platform === 'melolo' ? 'Melolo' : platform === 'reelshort' ? 'ReelShort' : 'FreeReels') + ' · Streaming HLS';
      if (Hls.isSupported()) {
        const hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
        hls.loadSource(resolvedSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { badge.textContent = badge.textContent; });
        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) setError('Gagal memuat video HLS: ' + data.type + ' - ' + (data.details || ''));
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = resolvedSrc;
        badge.textContent = 'Native HLS';
      } else {
        setError('Browser tidak mendukung HLS. Gunakan Chrome atau Safari.');
      }
    } else {
      // Direct MP4
      badge.textContent = (platform === 'melolo' ? 'Melolo' : 'Video') + ' · MP4 Streaming';
      video.src = resolvedSrc;
      video.addEventListener('error', () => {
        setError('Gagal memuat video MP4. Coba refresh halaman.');
      });
    }
  }
</script>
</body>
</html>
