<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.container { width: 100%; max-width: 900px; padding: 16px; }
h2 { text-align: center; margin-bottom: 12px; font-size: 1.05rem; color: #ddd; line-height: 1.4; }
.player-wrap { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; }
video { width: 100%; max-height: 78vh; display: block; background: #000; }
#overlay {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: rgba(0,0,0,.55); cursor: pointer;
}
#overlay.gone { display: none; }
#btn {
  width: 70px; height: 70px; border-radius: 50%; border: 2.5px solid #fff;
  background: rgba(255,255,255,.13); color: #fff; font-size: 1.8rem;
  display: flex; align-items: center; justify-content: center; padding-left: 4px;
  cursor: pointer; transition: background .15s;
}
#btn:disabled { opacity: .45; cursor: default; }
#btn:not(:disabled):active { background: rgba(255,255,255,.35); }
#hint { font-size: .83rem; color: #bbb; text-align: center; padding: 0 16px; }
.badge { text-align: center; margin-top: 10px; font-size: .78rem; color: #555; min-height: 1.1em; }
.err { text-align: center; color: #f55; font-size: .9rem; margin-top: 12px; }
@keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
.loading { animation: pulse 1.1s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">
  <h2 id="ttl">🎬 Drama Player</h2>
  <div class="player-wrap">
    <video id="vid" controls playsinline preload="none"></video>
    <div id="overlay">
      <button id="btn" disabled>▶</button>
      <span id="hint" class="loading">Memuat link…</span>
    </div>
  </div>
  <div class="badge" id="badge"></div>
  <div class="err" id="errmsg"></div>
</div>

<script>
// ── Parse params ──────────────────────────────────────────────────────────────
const P      = new URLSearchParams(location.search);
const plat   = P.get('platform') || '';
const srcRaw = P.get('url');
const title  = P.get('title');
const epNum  = P.get('ep');

// ── Update title immediately (no blocking) ───────────────────────────────────
if (title) {
  const t = decodeURIComponent(title);
  const s = P.get('season'), e = P.get('episode');
  const pre = s && e ? `S${s}E${e} · ` : epNum ? `Ep ${epNum} — ` : '';
  document.getElementById('ttl').textContent = pre + t;
  document.title = t;
}

const vid    = document.getElementById('vid');
const ov     = document.getElementById('overlay');
const btn    = document.getElementById('btn');
const hint   = document.getElementById('hint');
const badge  = document.getElementById('badge');
const errmsg = document.getElementById('errmsg');

function hideOverlay() { ov.classList.add('gone'); }
function markReady(text, warn) {
  hint.className = '';
  hint.textContent = text;
  btn.disabled = false;
  btn.style.borderColor = warn ? '#f90' : '#fff';
}
function setError(msg) {
  errmsg.textContent = msg;
  badge.textContent = '';
  ov.classList.add('gone');
}

// ── MovieBox — prefetch URL in background, play in gesture ───────────────────
if (plat === 'moviebox') {
  const subjectId = P.get('subjectId');
  if (!subjectId) { setError('Parameter tidak lengkap.'); }
  else {
    const q = new URLSearchParams({ subjectId, quality: P.get('quality') || '360' });
    if (P.get('season'))  q.set('season',  P.get('season'));
    if (P.get('episode')) q.set('episode', P.get('episode'));

    let ready = null;

    fetch('/resolve/mb?' + q)
      .then(r => r.json())
      .then(d => {
        if (d.error) { hint.className=''; hint.textContent='❌ ' + d.error; errmsg.textContent=d.error; return; }
        ready = d;
        markReady('Tap ▶ untuk mulai tonton', false);
      })
      .catch(() => { hint.className=''; hint.textContent='❌ Gagal. Refresh halaman.'; });

    btn.addEventListener('click', () => {
      if (!ready) return;
      hideOverlay();
      badge.textContent = `MovieBox · ${ready.quality}p`;

      // Set src + play WITHIN gesture context → no autoplay block on mobile
      vid.setAttribute('referrerpolicy', 'no-referrer');
      vid.src = ready.url;
      const p = vid.play();
      if (p) p.catch(() => { vid.load(); vid.play().catch(()=>{}); });

      let retried = false;
      vid.addEventListener('error', () => {
        if (retried) { setError('Gagal putar video. Kembali ke Discord dan pilih episode lagi.'); return; }
        retried = true;
        // Re-fetch fresh URL and retry
        fetch('/resolve/mb?' + q + '&_r=' + Date.now())
          .then(r => r.json())
          .then(d2 => {
            if (d2.error || d2.url === ready.url) { setError('Link kedaluwarsa. Kembali ke Discord dan pilih ulang episode.'); return; }
            vid.src = d2.url;
            vid.play().catch(()=>{});
            badge.textContent = `MovieBox · ${d2.quality}p (retry)`;
          })
          .catch(() => setError('Gagal memuat video. Coba lagi dari Discord.'));
      });
    }, { once: true });
  }

// ── HLS / direct MP4 (FreeReels, ReelShort, Melolo) ─────────────────────────
} else if (!srcRaw) {
  setError('URL video tidak tersedia.');
} else {
  const src = decodeURIComponent(srcRaw);
  const isHLS = src.includes('.m3u8') || src.includes('/proxy/m3u8') || src.includes('/proxy/direct');
  const labels = { melolo:'Melolo', reelshort:'ReelShort', freereels:'FreeReels' };
  const platLabel = labels[plat] || 'Video';

  if (isHLS) {
    // Load hls.js dynamically — only when needed
    const s = document.createElement('script');
    s.src = '/hls.js';
    s.onload = () => {
      if (Hls.isSupported()) {
        const hls = new Hls({ autoStartLoad: false, maxBufferLength: 30 });
        hls.loadSource(src);
        hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED, () => markReady(`Tap ▶ · ${platLabel}`, false));
        hls.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) setError(`Gagal HLS: ${d.details||d.type}`); });

        btn.addEventListener('click', () => {
          hideOverlay();
          hls.startLoad();
          const p = vid.play();
          if (p) p.catch(()=>{ vid.load(); vid.play().catch(()=>{}); });
          badge.textContent = `${platLabel} · HLS`;
        }, { once: true });

      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        // iOS native HLS
        vid.src = src;
        vid.addEventListener('loadedmetadata', () => markReady(`Tap ▶ · ${platLabel}`, false));
        vid.addEventListener('error', () => setError('Gagal load video.'));
        btn.addEventListener('click', () => {
          hideOverlay();
          vid.play().catch(()=>{});
          badge.textContent = `${platLabel} · HLS`;
        }, { once: true });
      } else {
        setError('Browser tidak support HLS. Gunakan Chrome atau Safari.');
      }
    };
    s.onerror = () => setError('Gagal load player. Refresh halaman.');
    document.head.appendChild(s);
  } else {
    // Direct MP4 — very simple
    markReady(`Tap ▶ untuk tonton · ${platLabel}`, false);
    btn.addEventListener('click', () => {
      hideOverlay();
      vid.src = src;
      const p = vid.play();
      if (p) p.catch(()=>{ vid.load(); vid.play().catch(()=>{}); });
      badge.textContent = `${platLabel}${P.get('quality') ? ' · '+P.get('quality')+'p' : ''}`;
      vid.addEventListener('error', () => setError('Gagal memuat video. Coba refresh.'));
    }, { once: true });
  }
}
</script>
</body>
</html>
