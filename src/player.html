<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drama Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .container { width: 100%; max-width: 900px; padding: 16px; }
  h2 { text-align: center; margin-bottom: 12px; font-size: 1.1rem; color: #ccc; }
  .player-wrap { position: relative; width: 100%; }
  video { width: 100%; border-radius: 10px; background: #000; max-height: 78vh; display: block; }
  #play-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); border-radius: 10px; cursor: pointer; gap: 12px;
  }
  #play-overlay.hidden { display: none; }
  #play-btn {
    font-size: 2rem; background: rgba(255,255,255,0.15); border: 2.5px solid #fff;
    border-radius: 50%; width: 72px; height: 72px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center; transition: background .2s;
    padding-left: 4px;
  }
  #play-btn:active { background: rgba(255,255,255,0.4); }
  #play-hint { font-size: 0.85rem; color: #ccc; text-align: center; padding: 0 12px; }
  .badge { text-align: center; margin-top: 10px; font-size: 0.8rem; color: #666; min-height: 1.2em; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  .loading { animation: pulse 1.2s ease-in-out infinite; }
  .error { text-align: center; color: #f55; font-size: 0.95rem; margin-top: 14px; }
</style>
</head>
<body>
<div class="container">
  <h2 id="title">🎬 Drama Player</h2>
  <div class="player-wrap">
    <video id="video" controls playsinline preload="none"></video>
    <div id="play-overlay">
      <button id="play-btn" disabled>▶</button>
      <span id="play-hint" class="loading">Memuat link...</span>
    </div>
  </div>
  <div class="badge" id="badge"></div>
  <div class="error" id="error"></div>
</div>
<script src="/hls.js"></script>
<script>
  const params   = new URLSearchParams(location.search);
  const src      = params.get('url');
  const title    = params.get('title');
  const ep       = params.get('ep');
  const platform = params.get('platform') || '';

  if (title) {
    const decoded = decodeURIComponent(title);
    const seLabel = params.get('season') && params.get('episode')
      ? `S${params.get('season')}E${params.get('episode')} · `
      : (ep ? `Episode ${ep} — ` : '');
    document.getElementById('title').textContent = seLabel + decoded;
    document.title = decoded;
  }

  const badge   = document.getElementById('badge');
  const video   = document.getElementById('video');
  const errEl   = document.getElementById('error');
  const overlay = document.getElementById('play-overlay');
  const playBtn = document.getElementById('play-btn');
  const hint    = document.getElementById('play-hint');

  function setError(msg) {
    errEl.textContent = msg;
    badge.textContent = '';
    badge.className = 'badge';
    overlay.classList.add('hidden');
  }

  function hideOverlay() { overlay.classList.add('hidden'); }

  function markReady(hintText, warn) {
    hint.className = warn ? '' : '';
    hint.textContent = hintText;
    playBtn.disabled = false;
    playBtn.style.borderColor = warn ? '#f90' : '#fff';
  }

  // ── MovieBox ─────────────────────────────────────────────────────────────────
  if (platform === 'moviebox') {
    const subjectId = params.get('subjectId');
    if (!subjectId) { setError('Parameter tidak lengkap.'); }
    else {
      const mbParams = new URLSearchParams({ subjectId, quality: params.get('quality') || '360' });
      if (params.get('season'))  mbParams.set('season',  params.get('season'));
      if (params.get('episode')) mbParams.set('episode', params.get('episode'));

      // Fetch URL immediately in background (saat halaman buka)
      let resolvedData = null;

      fetch('/resolve/mb?' + mbParams.toString())
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            hint.className = '';
            hint.textContent = '❌ Gagal load link';
            errEl.textContent = data.error;
            return;
          }
          resolvedData = data;
          if (data.stale) {
            markReady('⚠️ Link mungkin kedaluwarsa — tap ▶ coba dulu', true);
          } else {
            markReady('Tap ▶ untuk tonton', false);
          }
        })
        .catch(e => {
          hint.className = '';
          hint.textContent = '❌ Gagal. Refresh halaman.';
        });

      // Tap play: URL sudah siap, set src SEGERA dalam user gesture context
      playBtn.addEventListener('click', () => {
        if (!resolvedData) return; // masih loading, tombol disabled harusnya
        hideOverlay();
        badge.className = 'badge';
        badge.textContent = `MovieBox · ${resolvedData.quality}p · Streaming`;

        // Set src dalam gesture context → video.play() tidak diblokir mobile browser
        video.setAttribute('referrerpolicy', 'no-referrer');
        video.src = resolvedData.url;
        const playPromise = video.play();
        if (playPromise) {
          playPromise.catch(e => {
            // Autoplay policy? Coba paksa load dulu
            video.load();
            video.play().catch(() => {});
          });
        }

        let retried = false;
        video.addEventListener('error', () => {
          if (!retried) {
            retried = true;
            // Coba ambil URL baru
            fetch('/resolve/mb?' + mbParams.toString() + '&_r=' + Date.now())
              .then(r => r.json())
              .then(data2 => {
                if (data2.error || data2.url === resolvedData.url) {
                  setError('Link kedaluwarsa. Kembali ke Discord dan pilih episode lagi.');
                  return;
                }
                video.src = data2.url;
                video.play().catch(() => {});
                badge.textContent = `MovieBox · ${data2.quality}p · Streaming (retry)`;
              })
              .catch(() => setError('Gagal memuat video. Kembali ke Discord dan pilih episode lagi.'));
          } else {
            setError('Gagal memuat video. Kembali ke Discord dan pilih episode lagi.');
          }
        });
      }, { once: true });
    }

  // ── Platform lain (HLS / direct MP4) ────────────────────────────────────────
  } else if (!src) {
    setError('URL video tidak ditemukan.');
  } else {
    const resolvedSrc = decodeURIComponent(src);
    const isHLS = resolvedSrc.includes('.m3u8')
               || resolvedSrc.includes('/proxy/m3u8')
               || resolvedSrc.includes('/proxy/direct');
    const platLabel = { melolo: 'Melolo', reelshort: 'ReelShort', freereels: 'FreeReels' }[platform] || 'Video';

    // Pre-configure HLS in background (tidak mulai buffer, hanya siapkan)
    let hlsInstance = null;
    if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInstance = new Hls({ autoStartLoad: false, maxBufferLength: 30 });
      hlsInstance.loadSource(resolvedSrc);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        markReady(`Tap ▶ untuk tonton · ${platLabel}`, false);
      });
      hlsInstance.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) { hint.className=''; hint.textContent = '❌ Gagal load HLS'; }
      });
    } else if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS (iOS/Safari) — set src sekarang tapi jangan play
      video.src = resolvedSrc;
      video.addEventListener('loadedmetadata', () => markReady(`Tap ▶ · ${platLabel}`, false));
      video.addEventListener('error', () => { hint.className=''; hint.textContent = '❌ Gagal load'; });
    } else if (isHLS) {
      setError('Browser tidak mendukung HLS. Gunakan Chrome atau Safari.');
      return;
    } else {
      // Direct MP4 — siapkan tapi jangan buffer
      markReady(`Tap ▶ untuk tonton · ${platLabel}`, false);
    }

    playBtn.addEventListener('click', () => {
      hideOverlay();
      badge.className = 'badge';

      if (isHLS && hlsInstance) {
        // Mulai buffer dan play dalam gesture context
        hlsInstance.startLoad();
        const p = video.play();
        if (p) p.catch(() => { video.load(); video.play().catch(() => {}); });
        badge.textContent = `${platLabel} · Streaming HLS`;
        hlsInstance.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) setError(`Gagal: ${data.type} — ${data.details || ''}`);
        });
      } else if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
        const p = video.play();
        if (p) p.catch(() => {});
        badge.textContent = `${platLabel} · Native HLS`;
      } else {
        // Direct MP4
        const quality = params.get('quality');
        video.src = resolvedSrc;
        const p = video.play();
        if (p) p.catch(() => { video.load(); video.play().catch(() => {}); });
        badge.textContent = `${platLabel}${quality ? ' · ' + quality + 'p' : ''} · Streaming`;
        video.addEventListener('error', () => setError('Gagal memuat video. Coba refresh halaman.'));
      }
    }, { once: true });
  }
</script>
</body>
</html>
